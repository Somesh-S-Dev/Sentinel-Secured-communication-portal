version: '3.9'

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sentinel
      POSTGRES_USER:     sentinel_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_net

  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:             production
      DATABASE_URL:         postgresql://sentinel_user:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/sentinel
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY:       ${ENCRYPTION_KEY}
      PORT:                 3000
      WS_PORT:              3001
      CORS_ORIGIN:          ${CORS_ORIGIN:-http://localhost}
      UPLOAD_DIR:           /app/uploads
      MAX_FILE_SIZE_MB:     25
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"
      - "3001:3001"
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (nginx) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # mount your TLS certs here
    networks:
      - sentinel_net

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  sentinel_net:
    driver: bridge
